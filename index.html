    <!-- Critical CSS: font-face + baseline styles so first paint doesn't wait for JS -->
    <style>
      @font-face { font-family: 'ZebrawoodFill'; src: url('/fonts/ZebrawoodFill.woff2') format('woff2'); font-weight: 400; font-style: normal; font-display: swap; }
      @font-face { font-family: 'BogueSlab'; src: url('/fonts/BogueSlab-2.woff2') format('woff2'); font-weight: 700; font-style: normal; font-display: swap; }

      @font-face { font-family: 'BogueSlab'; src: url('/fonts/BogueSlab-4.woff2') format('woff2'); font-weight: 300; font-style: normal; font-display: swap; }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
      body { overflow-x: hidden; background: #f7f1de; color: #2a2b1f; font-family: 'BogueSlab', Georgia, serif; }
      button { cursor: pointer; }
      img { user-select: none; -webkit-user-drag: none; }
      .ff-display { font-family: "ZebrawoodFill", "Playfair Display", Georgia, serif; }
      .ff-body { font-family: 'BogueSlab', Georgia, serif; }
      .ff-ui { font-family: 'Source Sans 3', 'Segoe UI', Arial, sans-serif; }
      .ff-accent { font-family: 'p22-franklin-caslon', 'P22 Franklin Caslon', Georgia, serif; font-style: italic; }
    </style>
