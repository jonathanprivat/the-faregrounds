    <!--
      Analytics IDs (single source of truth for both gtag.js + Microsoft Clarity).
      Update the two values below to enable. Keep empty strings to disable.
      Public IDs (visible in network tab anyway) — safe to commit.
    -->
    <script>
      window.__FG_ANALYTICS__ = {
        gaId: "",          // e.g. "G-XXXXXXXXXX"
        clarityId: ""      // e.g. "abcdefghij"
      };
    </script>

    <!-- Google Analytics 4 (gtag.js) — loads only if a measurement ID is set -->
    <script>
      (function() {
        var id = (window.__FG_ANALYTICS__ || {}).gaId;
        if (!id) return;
        var s = document.createElement("script");
        s.async = true;
        s.src = "https://www.googletagmanager.com/gtag/js?id=" + encodeURIComponent(id);
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        window.gtag = function(){ window.dataLayer.push(arguments); };
        window.gtag("js", new Date());
        window.gtag("config", id, { send_page_view: true });
      })();
    </script>

    <!-- Microsoft Clarity (heatmaps + session recordings) — loads only if project ID is set -->
    <script>
      (function(c,l,a,r,i,t,y){
        if (!i) return;
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window, document, "clarity", "script", (window.__FG_ANALYTICS__ || {}).clarityId);
    </script>

    <!-- First-paint maintenance guard: synchronously checks site.json BEFORE React mounts.
         Prevents the homepage from flashing for ~200-400ms before the React gate fires. -->
    <script>
      (function () {
        try {
          var url = new URL(window.location.href);
          var bypass = url.searchParams.get('preview');
          var xhr = new XMLHttpRequest();
          xhr.open('GET', '/data/site.json', false); // sync, runs in <head> before body paints
          xhr.send(null);
          if (xhr.status >= 200 && xhr.status < 300) {
            var data = JSON.parse(xhr.responseText);
            var m = data && data.maintenance;
            if (m && m.enabled && (!m.preview_token || bypass !== m.preview_token)) {
              // Mark robots noindex BEFORE crawler sees content
              var robots = document.querySelector('meta[name="robots"]');
              if (robots) robots.setAttribute('content', 'noindex, nofollow');
              // Hide everything until React renders the ComingSoonPage
              document.documentElement.style.background = m.background_color || '#f7f1de';
              var style = document.createElement('style');
              style.textContent = 'body{visibility:hidden;background:' + (m.background_color || '#f7f1de') + ';}';
              document.head.appendChild(style);
              // Reveal once React paints something
              window.__fgMaintenanceFirstPaint = true;
            }
          }
        } catch (e) { /* fall through to normal site if check fails */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Reveal body once React has rendered (covers both maintenance and normal modes).
      // Uses requestAnimationFrame after main.jsx finishes parsing.
      if (window.__fgMaintenanceFirstPaint) {
        var reveal = function () {
          var root = document.getElementById('root');
          if (root && root.children.length > 0) {
            document.body.style.visibility = 'visible';
          } else {
            requestAnimationFrame(reveal);
          }
        };
        requestAnimationFrame(reveal);
      }
    </script>
