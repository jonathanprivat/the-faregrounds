<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" fill="none">
  <!-- Parchment background -->
  <rect width="520" height="320" rx="12" fill="#f6edc8" stroke="#4e5420" stroke-width="2"/>
  
  <!-- Paper noise texture -->
  <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feBlend in="SourceGraphic" mode="multiply" result="blend"/><feComposite in="blend" in2="SourceGraphic" operator="in"/></filter>
  <rect width="520" height="320" fill="#f6edc8" opacity="0.04" filter="url(#grain)"/>
  
  <!-- Ocean area (subtle blue-green tint) -->
  <rect x="2" y="2" width="516" height="316" rx="11" fill="#d8dfc0" opacity="0.12"/>
  
  <!-- Ocean waves scattered -->
  <g stroke="#7a7e2e" opacity="0.12" fill="none" stroke-linecap="round" stroke-width="0.7">
    <path d="M30 50 Q38 47 46 50 Q54 53 62 50"/>
    <path d="M420 35 Q428 32 436 35 Q444 38 452 35"/>
    <path d="M80 280 Q90 277 100 280 Q110 283 120 280"/>
    <path d="M350 290 Q358 287 366 290 Q374 293 382 290"/>
    <path d="M460 250 Q468 247 476 250 Q484 253 492 250"/>
    <path d="M20 180 Q28 177 36 180"/>
    <path d="M480 140 Q488 137 496 140"/>
    <path d="M200 300 Q210 297 220 300 Q230 303 240 300"/>
    <path d="M50 120 Q58 117 66 120"/>
    <path d="M15 260 Q25 257 35 260 Q45 263 55 260"/>
  </g>

  <!-- Tuckernuck Island -->
  <path d="M58 178 C62 174 70 172 78 171 C86 170 92 171 98 174 C102 176 104 179 103 182 
           C102 185 98 187 92 188 C86 189 78 188 72 186 C65 184 60 181 58 178 Z"
        fill="#efe1ab" stroke="#4e5420" stroke-width="1.2" stroke-linecap="round"/>
  <text x="78" y="196" font-family="Georgia, serif" font-size="6" fill="#4e5420" text-anchor="middle" font-style="italic" opacity="0.45">Tuckernuck</text>

  <!-- Muskeget Island (tiny) -->
  <ellipse cx="38" cy="186" rx="8" ry="4" fill="#efe1ab" stroke="#4e5420" stroke-width="0.8" opacity="0.7"/>
  
  <!-- NANTUCKET ISLAND - accurate shape based on real coastline -->
  <!-- The island is roughly crescent-shaped, wider west, with Great Point extending NE -->
  <path d="
    M120 168 
    C126 162 135 157 148 153 
    C158 150 170 148 182 147 
    C192 146 202 146 215 147 
    C228 148 238 150 250 152 
    C260 154 268 155 278 155 
    C290 155 302 153 315 148 
    C325 144 334 140 345 136 
    C355 132 365 129 375 128 
    C385 127 392 128 400 132 
    C406 135 410 139 415 145 
    C418 149 420 153 420 157 
    C420 160 418 163 414 166
    C408 172 398 175 388 176
    C378 177 370 174 358 170
    C348 166 340 165 330 167
    C322 169 316 172 308 176
    C300 180 292 185 282 190
    C270 197 258 200 244 202
    C232 204 222 203 210 200
    C198 197 190 193 180 188
    C170 183 162 181 152 180
    C142 179 134 181 126 184
    C120 187 116 189 112 189
    C108 189 105 186 104 182
    C103 178 106 172 112 168
    Z"
    fill="#efe1ab" stroke="#4e5420" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Great Point spit extending NE from the island -->
  <path d="M415 145 C420 138 424 130 426 122 C428 114 428 108 426 102 C425 98 422 95 420 94"
        fill="none" stroke="#4e5420" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M420 157 C425 150 430 140 432 130 C434 120 433 112 430 104 C428 99 425 96 420 94"
        fill="none" stroke="#4e5420" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Fill the spit -->
  <path d="M415 145 C420 138 424 130 426 122 C428 114 428 108 426 102 C425 98 422 95 420 94
           C425 96 428 99 430 104 C433 112 434 120 432 130 C430 140 425 150 420 157 
           C418 153 417 149 415 145 Z"
        fill="#efe1ab" stroke="none"/>

  <!-- Inner island roads/texture -->
  <g stroke="#7a7e2e" fill="none" stroke-linecap="round" opacity="0.1" stroke-width="0.5">
    <path d="M160 168 C190 162 220 160 260 164"/>
    <path d="M200 175 C230 170 260 172 290 180"/>
    <path d="M180 158 C210 155 240 156 270 160"/>
    <path d="M280 160 L310 155 L340 152"/>
  </g>

  <!-- Harbors / ponds indication -->
  <ellipse cx="310" cy="172" rx="8" ry="5" fill="#d8dfc0" opacity="0.3" stroke="#7a7e2e" stroke-width="0.4"/>
  <ellipse cx="180" cy="172" rx="6" ry="4" fill="#d8dfc0" opacity="0.25" stroke="#7a7e2e" stroke-width="0.3"/>

  <!-- === LOCATION LABELS === -->
  
  <!-- Great Point Lighthouse -->
  <circle cx="422" cy="96" r="2.5" fill="#4e5420" opacity="0.5"/>
  <text x="410" y="88" font-family="Georgia, serif" font-size="6.5" fill="#4e5420" font-style="italic" opacity="0.5" text-anchor="end">Great Point</text>

  <!-- Wauwinet -->
  <text x="408" y="160" font-family="Georgia, serif" font-size="6" fill="#4e5420" font-style="italic" opacity="0.4">Wauwinet</text>

  <!-- Nantucket Town -->
  <circle cx="310" cy="165" r="3.5" fill="#4e5420" opacity="0.35"/>
  <circle cx="310" cy="165" r="1.5" fill="#efe1ab"/>
  <text x="310" y="158" font-family="Georgia, serif" font-size="7" fill="#4e5420" text-anchor="middle" font-style="italic" opacity="0.5">Nantucket Town</text>

  <!-- Siasconset -->
  <circle cx="385" cy="180" r="2" fill="#4e5420" opacity="0.3"/>
  <text x="385" y="190" font-family="Georgia, serif" font-size="6" fill="#4e5420" text-anchor="middle" font-style="italic" opacity="0.4">'Sconset</text>

  <!-- Madaket -->
  <circle cx="125" cy="176" r="2" fill="#4e5420" opacity="0.3"/>
  <text x="118" y="172" font-family="Georgia, serif" font-size="6" fill="#4e5420" text-anchor="end" font-style="italic" opacity="0.4">Madaket</text>

  <!-- Dionis -->
  <text x="175" y="155" font-family="Georgia, serif" font-size="5.5" fill="#4e5420" font-style="italic" opacity="0.35">Dionis</text>

  <!-- Polpis -->
  <text x="360" y="147" font-family="Georgia, serif" font-size="5.5" fill="#4e5420" font-style="italic" opacity="0.35">Polpis</text>

  <!-- Cisco Beach -->
  <text x="175" y="200" font-family="Georgia, serif" font-size="5.5" fill="#4e5420" font-style="italic" opacity="0.3">Cisco Beach</text>

  <!-- Tom Nevers -->
  <text x="340" y="202" font-family="Georgia, serif" font-size="5.5" fill="#4e5420" font-style="italic" opacity="0.3">Tom Nevers</text>

  <!-- === THE FAREGROUNDS PIN === -->
  <!-- Located near center-west of town area, on Fairgrounds Road -->
  <g>
    <!-- Glow circle -->
    <circle cx="268" cy="168" r="12" fill="#d96a1f" opacity="0.12"/>
    <circle cx="268" cy="168" r="7" fill="#d96a1f" opacity="0.08"/>
    
    <!-- Pin drop -->
    <path d="M268 148 C263 148 258 152.5 258 157.5 C258 164 268 174 268 174 C268 174 278 164 278 157.5 C278 152.5 273 148 268 148 Z" 
          fill="#d96a1f" stroke="#4e5420" stroke-width="1.2" stroke-linejoin="round"/>
    <circle cx="268" cy="157" r="3" fill="#efe1ab"/>
    
    <!-- Label with underline -->
    <text x="268" y="140" font-family="Georgia, serif" font-size="9" font-weight="bold" fill="#4e5420" text-anchor="middle" font-style="italic">The Faregrounds</text>
    <text x="268" y="148" font-family="Georgia, serif" font-size="6.5" fill="#d96a1f" text-anchor="middle" font-style="italic" opacity="0.8">27 Fairgrounds Rd.</text>
  </g>

  <!-- === COMPASS ROSE === -->
  <g transform="translate(468, 58)">
    <circle cx="0" cy="0" r="24" stroke="#4e5420" stroke-width="0.6" fill="none" opacity="0.2"/>
    <circle cx="0" cy="0" r="16" stroke="#4e5420" stroke-width="0.4" fill="none" opacity="0.15"/>
    <!-- Main N-S axis -->
    <path d="M0 -22 L2.5 -5 L0 -8 L-2.5 -5 Z" fill="#4e5420" opacity="0.55"/>
    <path d="M0 22 L2 5 L0 8 L-2 5 Z" fill="#7a7e2e" opacity="0.2"/>
    <!-- E-W axis -->
    <path d="M22 0 L5 -2 L8 0 L5 2 Z" fill="#7a7e2e" opacity="0.2"/>
    <path d="M-22 0 L-5 -2 L-8 0 L-5 2 Z" fill="#7a7e2e" opacity="0.2"/>
    <!-- Diagonal lines -->
    <line x1="12" y1="-12" x2="-12" y2="12" stroke="#7a7e2e" stroke-width="0.3" opacity="0.15"/>
    <line x1="-12" y1="-12" x2="12" y2="12" stroke="#7a7e2e" stroke-width="0.3" opacity="0.15"/>
    <!-- Labels -->
    <text x="0" y="-28" font-family="Georgia, serif" font-size="9" font-weight="bold" fill="#4e5420" text-anchor="middle" opacity="0.5">N</text>
    <text x="0" y="34" font-family="Georgia, serif" font-size="7" fill="#4e5420" text-anchor="middle" opacity="0.25">S</text>
    <text x="30" y="3" font-family="Georgia, serif" font-size="7" fill="#4e5420" text-anchor="middle" opacity="0.25">E</text>
    <text x="-30" y="3" font-family="Georgia, serif" font-size="7" fill="#4e5420" text-anchor="middle" opacity="0.25">W</text>
  </g>

  <!-- === TITLE === -->
  <text x="28" y="35" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#4e5420" font-style="italic" opacity="0.65">Nantucket Island</text>
  <path d="M28 38 Q100 39 185 38" stroke="#4e5420" stroke-width="0.5" opacity="0.2" stroke-linecap="round"/>
  <text x="28" y="50" font-family="Georgia, serif" font-size="7.5" fill="#7a7e2e" font-style="italic" opacity="0.4">30 miles out to sea</text>

  <!-- Water body labels -->
  <text x="250" y="110" font-family="Georgia, serif" font-size="8" fill="#7a7e2e" font-style="italic" letter-spacing="6" opacity="0.18">NANTUCKET SOUND</text>
  <text x="160" y="240" font-family="Georgia, serif" font-size="7.5" fill="#7a7e2e" font-style="italic" letter-spacing="5" opacity="0.14">ATLANTIC OCEAN</text>

  <!-- Hatch marks around coastline (nautical chart style) -->
  <g stroke="#4e5420" stroke-width="0.4" opacity="0.12">
    <line x1="104" y1="185" x2="100" y2="190"/>
    <line x1="110" y1="188" x2="107" y2="193"/>
    <line x1="117" y1="190" x2="114" y2="195"/>
    <line x1="140" y1="183" x2="138" y2="189"/>
    <line x1="200" y1="200" x2="198" y2="206"/>
    <line x1="215" y1="202" x2="213" y2="208"/>
    <line x1="240" y1="204" x2="238" y2="210"/>
    <line x1="270" y1="200" x2="269" y2="206"/>
    <line x1="300" y1="192" x2="299" y2="198"/>
    <line x1="340" y1="200" x2="339" y2="206"/>
    <line x1="370" y1="182" x2="372" y2="188"/>
    <line x1="390" y1="177" x2="393" y2="183"/>
    <line x1="415" y1="167" x2="419" y2="172"/>
  </g>

  <!-- Tiny sailboats -->
  <g transform="translate(400, 230)" opacity="0.2">
    <line x1="0" y1="0" x2="0" y2="-14" stroke="#4e5420" stroke-width="0.8"/>
    <path d="M0 -14 L9 -4 L0 -2 Z" fill="#4e5420" opacity="0.35"/>
    <path d="M-1 -12 L-7 -3 L-1 -2 Z" fill="#4e5420" opacity="0.25"/>
    <path d="M-5 1 Q0 -1 5 1" stroke="#4e5420" stroke-width="0.8" fill="none"/>
  </g>
  <g transform="translate(65, 130)" opacity="0.15">
    <line x1="0" y1="0" x2="0" y2="-10" stroke="#4e5420" stroke-width="0.6"/>
    <path d="M0 -10 L6 -3 L0 -1 Z" fill="#4e5420" opacity="0.3"/>
    <path d="M-3 1 Q0 -1 3 1" stroke="#4e5420" stroke-width="0.6" fill="none"/>
  </g>
  <g transform="translate(320, 260)" opacity="0.12">
    <line x1="0" y1="0" x2="0" y2="-8" stroke="#4e5420" stroke-width="0.5"/>
    <path d="M0 -8 L5 -2 L0 0 Z" fill="#4e5420" opacity="0.3"/>
    <path d="M-3 1 Q0 -1 3 1" stroke="#4e5420" stroke-width="0.5" fill="none"/>
  </g>

  <!-- Scale bar -->
  <g transform="translate(28, 280)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#4e5420" stroke-width="0.8" opacity="0.3"/>
    <line x1="0" y1="-3" x2="0" y2="3" stroke="#4e5420" stroke-width="0.6" opacity="0.3"/>
    <line x1="60" y1="-3" x2="60" y2="3" stroke="#4e5420" stroke-width="0.6" opacity="0.3"/>
    <line x1="30" y1="-2" x2="30" y2="2" stroke="#4e5420" stroke-width="0.4" opacity="0.2"/>
    <text x="30" y="10" font-family="Georgia, serif" font-size="5.5" fill="#4e5420" text-anchor="middle" font-style="italic" opacity="0.3">~ 5 miles</text>
  </g>
</svg>
